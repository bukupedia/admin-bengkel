<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:;">
  <meta name="description" content="Sparepart Bengkel App - Kelola data sparepart dan stok inventory.">
  <title>Sparepart - Bengkel App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="sparepart">

<div id="navbar"></div>

<div class="container mt-4">
  <div class="d-flex justify-content-between">
    <h3>Sparepart</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPart">
      + Tambah
    </button>
  </div>

  <div class="position-relative">
    <input type="text" id="searchPart" class="form-control mt-3" placeholder="Cari sparepart..." aria-label="Cari sparepart">
    <span class="position-absolute top-50 end-0 me-3" style="cursor: pointer; display: none; transform: translateY(-50%);" id="clearSearchPart" role="button" aria-label="Hapus pencarian">✕</span>
  </div>

  <div class="table-responsive">
    <table class="table mt-3 table-hover">
      <thead class="table-light">
        <tr>
          <th>Nama</th>
          <th>Quantity</th>
          <th>Harga</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="partTable"></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalPart">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Tambah Sparepart</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="namaPart" class="form-label">Nama Part</label>
          <input id="namaPart" class="form-control" placeholder="Nama Part" required>
          <div class="invalid-feedback">Nama sparepart wajib diisi</div>
        </div>
        <div class="mb-3">
          <label for="qtyPart" class="form-label">Quantity</label>
          <input id="qtyPart" type="number" class="form-control" placeholder="Quantity" min="0">
          <div class="invalid-feedback">Quantity tidak valid</div>
        </div>
        <div class="mb-3">
          <label for="hargaPart" class="form-label">Harga</label>
          <input id="hargaPart" type="number" class="form-control" placeholder="Harga" required>
          <div class="invalid-feedback">Harga wajib diisi dan harus angka positif</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="savePart">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
