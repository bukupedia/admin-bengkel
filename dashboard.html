<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Bengkel App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    .card-summary {
      transition: transform 0.2s;
    }
    .card-summary:hover {
      transform: translateY(-5px);
    }
    .stat-icon {
      font-size: 2rem;
    }
  </style>
</head>
<body data-page="dashboard">

<div id="navbar"></div>

<div class="container mt-4">
  <h3>📊 Dashboard</h3>
  
  <!-- Stats Cards -->
  <div class="row mt-3">
    <div class="col-md-3">
      <div class="card card-summary p-3 border-0 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-muted">Menunggu</h6>
            <h3 id="servisMenunggu" class="text-secondary">0</h3>
          </div>
          <div class="stat-icon">⏳</div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-summary p-3 border-0 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-muted">Diproses</h6>
            <h3 id="servisDiproses" class="text-warning">0</h3>
          </div>
          <div class="stat-icon">🔧</div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-summary p-3 border-0 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-muted">Selesai</h6>
            <h3 id="servisSelesai" class="text-success">0</h3>
          </div>
          <div class="stat-icon">✓</div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-summary p-3 border-0 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-muted">Total Pendapatan</h6>
            <h3 id="totalPendapatan" class="text-success">Rp 0</h3>
          </div>
          <div class="stat-icon">💰</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Recent Servis -->
  <div class="row mt-4">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0">📋 Servis Terbaru</h5>
        </div>
        <div class="card-body" id="recentServis">
          <!-- Dynamic content -->
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
