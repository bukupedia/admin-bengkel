<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:;">
  <meta name="description" content="Data Servis Bengkel App - Kelola data servis dan perawatan kendaraan.">
  <title>Data Servis - Bengkel App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="servis">

<div id="navbar"></div>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center">
    <h3>Data Servis</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalServis">
      + Tambah Servis
    </button>
  </div>

  <div class="position-relative">
    <input type="text" id="searchServis" class="form-control mt-3" placeholder="Cari berdasarkan nama pelanggan atau nomor polisi..." aria-label="Cari servis">
    <span class="position-absolute top-50 end-0 me-3" style="cursor: pointer; display: none; transform: translateY(-50%);" id="clearSearchServis" role="button" aria-label="Hapus pencarian">✕</span>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered mt-3">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Pelanggan</th>
          <th>No. Polisi</th>
          <th>Total</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="servisTable"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalServis">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Tambah Servis</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">

  <!-- Tanggal -->
  <div class="mb-3">
    <label for="tanggal" class="form-label">Tanggal Servis</label>
    <input id="tanggal" type="date" class="form-control">
    <div class="invalid-feedback">Tanggal servis wajib diisi</div>
  </div>

  <!-- Pelanggan dengan Pencarian (combobox style GitHub) -->
  <div class="mb-3">
    <label for="customerSearch" class="form-label">Pelanggan</label>
    <input type="text" id="customerSearch" class="form-control" placeholder="Cari nama atau nomor polisi..." list="customerList" autocomplete="off">
    <div class="invalid-feedback">Pelanggan wajib dipilih</div>
    <datalist id="customerList"></datalist>
  </div>

  <!-- ITEM LIST -->
  <div class="mb-3">
    <label class="form-label">Item Servis</label>
    <div id="itemContainer"></div>
  </div>
  <datalist id="partDatalist"></datalist>

  <button class="btn btn-sm btn-secondary mb-3" id="addItem" type="button">
    + Tambah Item
  </button>

  <!-- TOTAL -->
  <div class="alert alert-info">
    <h5>Total: <span id="totalDisplay">Rp 0</span></h5>
    <small class="text-muted">Item: <span id="itemCountDisplay">0</span> | Jumlah Quantity: <span id="qtyCountDisplay">0</span></small>
  </div>

</div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="saveServis">Simpan</button>
      </div>
    </div>
  </div>
</div>

  <div class="modal fade" id="modalDetail">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5>Detail Servis</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <p><strong>Pelanggan:</strong> <span id="detailCustomer"></span></p>
        <p><strong>No. Polisi:</strong> <span id="detailPoliceNumber"></span></p>
        <p><strong>Tanggal:</strong> <span id="detailTanggal"></span></p>
        <p><strong>Status:</strong> <span id="detailStatus"></span></p>

        <hr>

        <h6>Item:</h6>
        <ul id="detailItems" class="list-group mb-3"></ul>

        <h5>Total: <span id="detailTotal"></span></h5>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
